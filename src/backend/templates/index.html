<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>防火墙管理工具</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0f1117;
      --bg2: #1a1d27;
      --bg3: #242736;
      --border: #2e3247;
      --accent: #4f8ef7;
      --accent-hover: #3a7ae4;
      --danger: #e05252;
      --danger-hover: #c94040;
      --success: #3ec97e;
      --warning: #f0a732;
      --text: #e2e6f0;
      --text2: #8b93a8;
      --radius: 8px;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "PingFang SC", "Microsoft YaHei", sans-serif;
      font-size: 14px;
      min-height: 100vh;
    }

    /* ---- Top Bar ---- */
    .topbar {
      background: var(--bg2);
      border-bottom: 1px solid var(--border);
      padding: 0 24px;
      height: 56px;
      display: flex;
      align-items: center;
      gap: 16px;
      position: sticky;
      top: 0;
      z-index: 100;
    }
    .topbar-title {
      font-size: 18px;
      font-weight: 600;
      color: var(--text);
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .topbar-title svg { color: var(--accent); }
    .status-badge {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 4px 10px;
      border-radius: 20px;
      font-size: 12px;
      font-weight: 500;
    }
    .status-badge.running { background: rgba(62,201,126,.15); color: var(--success); }
    .status-badge.stopped { background: rgba(224,82,82,.15); color: var(--danger); }
    .status-dot {
      width: 7px; height: 7px;
      border-radius: 50%;
      background: currentColor;
    }
    .topbar-meta { margin-left: auto; color: var(--text2); font-size: 12px; display: flex; gap: 16px; }
    .topbar-meta span { display: flex; align-items: center; gap: 4px; }

    /* ---- Layout ---- */
    .layout {
      display: flex;
      min-height: calc(100vh - 56px);
    }

    /* ---- Sidebar ---- */
    .sidebar {
      width: 220px;
      flex-shrink: 0;
      background: var(--bg2);
      border-right: 1px solid var(--border);
      padding: 16px 0;
    }
    .sidebar-label {
      padding: 8px 16px 4px;
      font-size: 11px;
      font-weight: 600;
      color: var(--text2);
      text-transform: uppercase;
      letter-spacing: .08em;
    }
    .zone-item {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 9px 16px;
      cursor: pointer;
      border-left: 3px solid transparent;
      color: var(--text2);
      transition: all .15s;
    }
    .zone-item:hover { background: var(--bg3); color: var(--text); }
    .zone-item.active {
      background: rgba(79,142,247,.1);
      border-left-color: var(--accent);
      color: var(--accent);
    }
    .zone-icon {
      width: 7px; height: 7px;
      border-radius: 50%;
      background: var(--border);
      flex-shrink: 0;
    }
    .zone-item.active .zone-icon { background: var(--accent); }

    /* ---- Main ---- */
    .main {
      flex: 1;
      padding: 24px;
      overflow-y: auto;
    }

    /* ---- Zone Header ---- */
    .zone-header {
      margin-bottom: 20px;
    }
    .zone-header h2 {
      font-size: 20px;
      font-weight: 600;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .zone-header .meta {
      margin-top: 6px;
      color: var(--text2);
      font-size: 13px;
      display: flex;
      gap: 16px;
      flex-wrap: wrap;
    }
    .meta-item { display: flex; align-items: center; gap: 4px; }

    /* ---- Tabs ---- */
    .tabs {
      display: flex;
      gap: 2px;
      border-bottom: 1px solid var(--border);
      margin-bottom: 20px;
    }
    .tab-btn {
      padding: 10px 18px;
      background: none;
      border: none;
      border-bottom: 2px solid transparent;
      color: var(--text2);
      cursor: pointer;
      font-size: 14px;
      transition: all .15s;
      margin-bottom: -1px;
    }
    .tab-btn:hover { color: var(--text); }
    .tab-btn.active { color: var(--accent); border-bottom-color: var(--accent); }
    .tab-panel { display: none; }
    .tab-panel.active { display: block; }

    /* ---- Cards ---- */
    .card {
      background: var(--bg2);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      margin-bottom: 16px;
    }
    .card-header {
      padding: 14px 18px;
      border-bottom: 1px solid var(--border);
      font-weight: 600;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
    }
    .card-body { padding: 18px; }

    /* ---- Table ---- */
    .table-wrap { overflow-x: auto; }
    table { width: 100%; border-collapse: collapse; }
    th {
      text-align: left;
      padding: 8px 12px;
      font-size: 12px;
      font-weight: 600;
      color: var(--text2);
      text-transform: uppercase;
      letter-spacing: .05em;
      border-bottom: 1px solid var(--border);
    }
    td { padding: 10px 12px; border-bottom: 1px solid var(--border); }
    tr:last-child td { border-bottom: none; }
    tr:hover td { background: rgba(255,255,255,.02); }
    .tag {
      display: inline-block;
      padding: 2px 8px;
      border-radius: 4px;
      font-size: 12px;
      background: var(--bg3);
      color: var(--text2);
      border: 1px solid var(--border);
    }
    .tag.blue { background: rgba(79,142,247,.15); color: var(--accent); border-color: rgba(79,142,247,.3); }
    .tag.green { background: rgba(62,201,126,.15); color: var(--success); border-color: rgba(62,201,126,.3); }
    .empty-row td { text-align: center; color: var(--text2); padding: 24px; }

    /* ---- Form ---- */
    .form-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
      gap: 12px;
    }
    .form-group { display: flex; flex-direction: column; gap: 6px; }
    .form-group.full { grid-column: 1 / -1; }
    label { font-size: 12px; color: var(--text2); font-weight: 500; }
    input, select, textarea {
      background: var(--bg3);
      border: 1px solid var(--border);
      border-radius: 6px;
      color: var(--text);
      padding: 8px 10px;
      font-size: 13px;
      font-family: inherit;
      transition: border-color .15s;
      outline: none;
    }
    input:focus, select:focus, textarea:focus { border-color: var(--accent); }
    textarea { resize: vertical; min-height: 72px; }
    select option { background: var(--bg3); }

    .form-actions {
      margin-top: 14px;
      display: flex;
      gap: 8px;
      align-items: center;
    }

    /* ---- Buttons ---- */
    .btn {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 8px 16px;
      border-radius: 6px;
      border: none;
      cursor: pointer;
      font-size: 13px;
      font-weight: 500;
      font-family: inherit;
      transition: all .15s;
    }
    .btn-primary { background: var(--accent); color: #fff; }
    .btn-primary:hover { background: var(--accent-hover); }
    .btn-danger { background: var(--danger); color: #fff; }
    .btn-danger:hover { background: var(--danger-hover); }
    .btn-ghost {
      background: transparent;
      color: var(--text2);
      border: 1px solid var(--border);
    }
    .btn-ghost:hover { background: var(--bg3); color: var(--text); }
    .btn-sm { padding: 5px 10px; font-size: 12px; }
    .btn:disabled { opacity: .5; cursor: not-allowed; }

    /* ---- Flags row ---- */
    .flags-row {
      display: flex;
      gap: 16px;
      align-items: center;
    }
    .checkbox-group {
      display: flex;
      align-items: center;
      gap: 6px;
      cursor: pointer;
      font-size: 13px;
      color: var(--text2);
    }
    .checkbox-group input[type=checkbox] { width: 14px; height: 14px; accent-color: var(--accent); }

    /* ---- Rich rule mode toggle ---- */
    .mode-toggle {
      display: flex;
      gap: 0;
      border: 1px solid var(--border);
      border-radius: 6px;
      overflow: hidden;
      width: fit-content;
      margin-bottom: 14px;
    }
    .mode-btn {
      padding: 7px 16px;
      font-size: 12px;
      font-weight: 500;
      background: none;
      border: none;
      color: var(--text2);
      cursor: pointer;
      transition: all .15s;
    }
    .mode-btn.active { background: var(--accent); color: #fff; }

    /* ---- Toast ---- */
    #toast-container {
      position: fixed;
      top: 70px;
      right: 20px;
      z-index: 9999;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }
    .toast {
      min-width: 260px;
      max-width: 380px;
      padding: 12px 16px;
      border-radius: var(--radius);
      border-left: 4px solid;
      font-size: 13px;
      line-height: 1.5;
      animation: slide-in .2s ease;
      background: var(--bg2);
      box-shadow: 0 4px 20px rgba(0,0,0,.4);
    }
    .toast.success { border-color: var(--success); color: var(--success); }
    .toast.error { border-color: var(--danger); color: var(--danger); }
    .toast .toast-msg { color: var(--text); }
    @keyframes slide-in {
      from { transform: translateX(30px); opacity: 0; }
      to { transform: translateX(0); opacity: 1; }
    }

    /* ---- Loading ---- */
    .loading { display: flex; align-items: center; gap: 8px; color: var(--text2); padding: 20px; }
    .spinner {
      width: 16px; height: 16px;
      border: 2px solid var(--border);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin .6s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ---- Placeholder ---- */
    .placeholder {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 60px 20px;
      color: var(--text2);
      text-align: center;
      gap: 12px;
    }
    .placeholder svg { opacity: .3; }
    .placeholder p { font-size: 15px; }

    /* ---- Divider ---- */
    hr { border: none; border-top: 1px solid var(--border); margin: 16px 0; }

    /* ---- Rich rule code ---- */
    .rule-code {
      font-family: "SFMono-Regular", Consolas, "Liberation Mono", Menlo, monospace;
      font-size: 12px;
      color: var(--warning);
      word-break: break-all;
    }

    /* ---- Overview grid ---- */
    .stat-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
      gap: 12px;
      margin-bottom: 20px;
    }
    .stat-card {
      background: var(--bg3);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 16px;
      text-align: center;
    }
    .stat-num { font-size: 28px; font-weight: 700; color: var(--accent); }
    .stat-label { font-size: 12px; color: var(--text2); margin-top: 4px; }

    /* Responsive */
    @media (max-width: 768px) {
      .sidebar { display: none; }
      .form-grid { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>

<!-- Top Bar -->
<header class="topbar">
  <div class="topbar-title">
    <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
      <path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/>
    </svg>
    防火墙管理工具
  </div>
  <div id="fw-status-badge" class="status-badge stopped">
    <span class="status-dot"></span>
    <span id="fw-status-text">检测中...</span>
  </div>
  <div class="topbar-meta">
    <span id="meta-version" title="firewalld 版本"></span>
    <span id="meta-default-zone" title="默认 Zone"></span>
  </div>
</header>

<!-- Layout -->
<div class="layout">
  <!-- Sidebar -->
  <nav class="sidebar">
    <div class="sidebar-label">Zone 列表</div>
    <div id="zone-list">
      <div class="loading"><span class="spinner"></span> 加载中...</div>
    </div>
  </nav>

  <!-- Main Content -->
  <main class="main" id="main-content">
    <div class="placeholder">
      <svg width="64" height="64" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.2">
        <path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/>
      </svg>
      <p>请从左侧选择一个 Zone 进行管理</p>
    </div>
  </main>
</div>

<!-- Toast Container -->
<div id="toast-container"></div>

<script>
const API = '/api/v1';
let currentZone = null;
let allServices = [];

/* ---- Utility ---- */
function toast(msg, type = 'success') {
  const el = document.createElement('div');
  el.className = `toast ${type}`;
  el.innerHTML = `<strong>${type === 'success' ? '成功' : '错误'}</strong><div class="toast-msg">${msg}</div>`;
  document.getElementById('toast-container').appendChild(el);
  setTimeout(() => el.remove(), 4000);
}

async function api(method, path, body) {
  const opts = {
    method,
    headers: { 'Content-Type': 'application/json' },
  };
  if (body) opts.body = JSON.stringify(body);
  const res = await fetch(API + path, opts);
  return res.json();
}

function esc(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

/* ---- Status ---- */
async function loadStatus() {
  try {
    const data = await api('GET', '/status');
    if (data.success) {
      const d = data.data;
      const badge = document.getElementById('fw-status-badge');
      const txt = document.getElementById('fw-status-text');
      if (d.state === 'running') {
        badge.className = 'status-badge running';
        txt.textContent = '运行中';
      } else {
        badge.className = 'status-badge stopped';
        txt.textContent = '未运行';
      }
      const vEl = document.getElementById('meta-version');
      if (d.firewalld_version && d.firewalld_version !== 'unknown') {
        vEl.textContent = `firewalld ${d.firewalld_version}`;
      }
      const dzEl = document.getElementById('meta-default-zone');
      if (d.default_zone) {
        dzEl.textContent = `默认 Zone: ${d.default_zone}`;
      }
    }
  } catch(e) { /* ignore */ }
}

/* ---- Zones ---- */
async function loadZones() {
  try {
    const data = await api('GET', '/zones');
    const container = document.getElementById('zone-list');
    if (!data.success) {
      container.innerHTML = '<div style="padding:12px 16px;color:var(--danger);font-size:12px;">加载失败</div>';
      return;
    }
    const zones = data.data.zones;
    container.innerHTML = zones.map(z => `
      <div class="zone-item" data-zone="${esc(z)}" onclick="selectZone('${esc(z)}')">
        <span class="zone-icon"></span>
        ${esc(z)}
      </div>
    `).join('');
  } catch(e) {
    document.getElementById('zone-list').innerHTML = '<div style="padding:12px 16px;color:var(--danger);font-size:12px;">网络错误</div>';
  }
}

/* ---- All Services (for dropdown) ---- */
async function loadAllServices() {
  try {
    const data = await api('GET', '/services');
    if (data.success) allServices = data.data.services;
  } catch(e) {}
}

/* ---- Select Zone ---- */
async function selectZone(zone) {
  currentZone = zone;
  // Update sidebar
  document.querySelectorAll('.zone-item').forEach(el => {
    el.classList.toggle('active', el.dataset.zone === zone);
  });
  // Render main
  const main = document.getElementById('main-content');
  main.innerHTML = `<div class="loading"><span class="spinner"></span> 加载 Zone 数据...</div>`;
  try {
    const data = await api('GET', `/zones/${zone}`);
    if (!data.success) {
      main.innerHTML = `<div style="color:var(--danger);padding:20px;">${esc(data.message)}</div>`;
      return;
    }
    renderZone(data.data);
  } catch(e) {
    main.innerHTML = `<div style="color:var(--danger);padding:20px;">加载失败：网络错误</div>`;
  }
}

/* ---- Render Zone ---- */
function renderZone(d) {
  const main = document.getElementById('main-content');
  main.innerHTML = `
    <div class="zone-header">
      <h2>
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="var(--accent)" stroke-width="2">
          <path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/>
        </svg>
        ${esc(d.zone)}
        <span class="tag">${esc(d.target || 'default')}</span>
      </h2>
      <div class="meta">
        ${d.interfaces && d.interfaces.length ? `<span class="meta-item">🔌 网卡: ${d.interfaces.map(esc).join(', ')}</span>` : ''}
        <span class="meta-item">🔷 端口: ${d.ports ? d.ports.length : 0} 条</span>
        <span class="meta-item">⚙️ 服务: ${d.services ? d.services.length : 0} 条</span>
        <span class="meta-item">📋 富规则: ${d.rich_rules ? d.rich_rules.length : 0} 条</span>
        <span class="meta-item">🌐 来源: ${d.sources ? d.sources.length : 0} 条</span>
      </div>
    </div>

    <div class="tabs">
      <button class="tab-btn active" onclick="switchTab('overview', this)">概览</button>
      <button class="tab-btn" onclick="switchTab('ports', this)">端口规则</button>
      <button class="tab-btn" onclick="switchTab('services', this)">服务规则</button>
      <button class="tab-btn" onclick="switchTab('rich-rules', this)">富规则</button>
      <button class="tab-btn" onclick="switchTab('sources', this)">来源地址</button>
    </div>

    <div id="tab-overview" class="tab-panel active">${renderOverview(d)}</div>
    <div id="tab-ports" class="tab-panel">${renderPorts(d.ports || [])}</div>
    <div id="tab-services" class="tab-panel">${renderServices(d.services || [])}</div>
    <div id="tab-rich-rules" class="tab-panel">${renderRichRules(d.rich_rules || [])}</div>
    <div id="tab-sources" class="tab-panel">${renderSources(d.sources || [])}</div>
  `;
}

function switchTab(name, btn) {
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
  document.querySelectorAll('.tab-panel').forEach(p => p.classList.remove('active'));
  btn.classList.add('active');
  document.getElementById(`tab-${name}`).classList.add('active');
}

/* ---- Overview ---- */
function renderOverview(d) {
  const ports = d.ports || [];
  const services = d.services || [];
  const rules = d.rich_rules || [];
  const sources = d.sources || [];
  return `
    <div class="stat-grid">
      <div class="stat-card">
        <div class="stat-num">${ports.length}</div>
        <div class="stat-label">开放端口</div>
      </div>
      <div class="stat-card">
        <div class="stat-num">${services.length}</div>
        <div class="stat-label">启用服务</div>
      </div>
      <div class="stat-card">
        <div class="stat-num">${rules.length}</div>
        <div class="stat-label">富规则</div>
      </div>
      <div class="stat-card">
        <div class="stat-num">${sources.length}</div>
        <div class="stat-label">来源地址</div>
      </div>
    </div>
    ${ports.length > 0 ? `
    <div class="card">
      <div class="card-header">开放端口</div>
      <div class="card-body" style="display:flex;flex-wrap:wrap;gap:8px;">
        ${ports.map(p => `<span class="tag blue">${esc(p)}</span>`).join('')}
      </div>
    </div>` : ''}
    ${services.length > 0 ? `
    <div class="card">
      <div class="card-header">启用服务</div>
      <div class="card-body" style="display:flex;flex-wrap:wrap;gap:8px;">
        ${services.map(s => `<span class="tag green">${esc(s)}</span>`).join('')}
      </div>
    </div>` : ''}
    ${rules.length > 0 ? `
    <div class="card">
      <div class="card-header">富规则</div>
      <div class="card-body" style="display:flex;flex-direction:column;gap:8px;">
        ${rules.map(r => `<code class="rule-code">${esc(r)}</code>`).join('')}
      </div>
    </div>` : ''}
    ${sources.length > 0 ? `
    <div class="card">
      <div class="card-header">来源地址</div>
      <div class="card-body" style="display:flex;flex-wrap:wrap;gap:8px;">
        ${sources.map(s => `<span class="tag">${esc(s)}</span>`).join('')}
      </div>
    </div>` : ''}
    ${ports.length === 0 && services.length === 0 && rules.length === 0 && sources.length === 0 ? `
    <div class="card">
      <div class="card-body">
        <div class="placeholder" style="padding:30px 20px;">
          <p>该 Zone 暂无任何规则</p>
        </div>
      </div>
    </div>` : ''}
  `;
}

/* ---- Ports Tab ---- */
function renderPorts(ports) {
  return `
    <div class="card">
      <div class="card-header">已开放端口</div>
      <div class="card-body">
        <div class="table-wrap">
          <table>
            <thead>
              <tr><th>端口/协议</th><th>操作</th></tr>
            </thead>
            <tbody id="ports-tbody">
              ${ports.length === 0
                ? '<tr class="empty-row"><td colspan="2">暂无端口规则</td></tr>'
                : ports.map(p => {
                    const [port, proto] = p.split('/');
                    return `<tr>
                      <td><span class="tag blue">${esc(p)}</span></td>
                      <td>
                        <button class="btn btn-danger btn-sm" onclick="deletePort('${esc(port)}','${esc(proto)}',null,this)">删除</button>
                      </td>
                    </tr>`;
                  }).join('')
              }
            </tbody>
          </table>
        </div>
      </div>
    </div>

    <div class="card">
      <div class="card-header">新增端口规则</div>
      <div class="card-body">
        <form onsubmit="addPort(event)">
          <div class="form-grid">
            <div class="form-group">
              <label>端口号 *</label>
              <input type="text" id="port-in" placeholder="如 8080 或 8000-8100" required />
            </div>
            <div class="form-group">

// Store rich rules for delete by index
let currentRichRules = [];

function setRRMode(mode) {
  const isRaw = mode === 'raw';
  document.getElementById('rr-raw-form').style.display = isRaw ? '' : 'none';
  document.getElementById('rr-struct-form').style.display = isRaw ? 'none' : '';
  document.getElementById('rr-mode-raw-btn').classList.toggle('active', isRaw);
  document.getElementById('rr-mode-struct-btn').classList.toggle('active', !isRaw);
}

async function addRichRuleRaw(e) {
  e.preventDefault();
  const rule = document.getElementById('rr-raw-input').value.trim();
  if (!rule) { toast('请输入规则字符串', 'error'); return; }
  const permanent = document.getElementById('rr-raw-permanent').checked;
  const runtime_only = document.getElementById('rr-raw-rt-only').checked;
  try {
    const data = await api('POST', `/zones/${currentZone}/rich-rules`, { rule, permanent, runtime_only });
    if (data.success) {
      toast(data.message);
      refreshTab('rich-rules');
    } else {
      toast(data.message, 'error');
    }
  } catch(err) {
    toast('请求失败：网络错误', 'error');
  }
}

async function addRichRuleStruct(e) {
  e.preventDefault();
  const body = {
    structured: true,
    family: document.getElementById('rr-family').value,
    source_address: document.getElementById('rr-src').value.trim(),
    source_invert: document.getElementById('rr-src-invert').checked,
    destination_address: document.getElementById('rr-dst').value.trim(),
    service: document.getElementById('rr-svc').value.trim(),
    port: document.getElementById('rr-port').value.trim(),
    protocol: document.getElementById('rr-proto').value,
    action: document.getElementById('rr-action').value,
    log_prefix: document.getElementById('rr-log-prefix').value.trim(),
    log_level: document.getElementById('rr-log-level').value,
    priority: parseInt(document.getElementById('rr-priority').value) || 0,
    permanent: document.getElementById('rr-struct-permanent').checked,
    runtime_only: document.getElementById('rr-struct-rt-only').checked,
  };
  try {
    const data = await api('POST', `/zones/${currentZone}/rich-rules`, body);
    if (data.success) {
      toast(data.message);
      refreshTab('rich-rules');
    } else {
      toast(data.message, 'error');
    }
  } catch(err) {
    toast('请求失败：网络错误', 'error');
  }
}

async function deleteRichRule(idx, btn) {
  const rule = currentRichRules[idx];

    if (data.success) {

      refreshTab('rich-rules');

      btn.disabled = false;

  } catch(err) {
    toast('请求失败：网络错误', 'error');

  }
}

/* ---- Refresh single tab ---- */
async function refreshTab(tabName) {
  if (!currentZone) return;
  try {
    const data = await api('GET', `/zones/${currentZone}`);
    if (!data.success) return;
    const d = data.data;

    // Update stat cards if overview exists
    const overviewPanel = document.getElementById('tab-overview');
    if (overviewPanel) overviewPanel.innerHTML = renderOverview(d);

    if (tabName === 'ports') {
      document.getElementById('tab-ports').innerHTML = renderPorts(d.ports || []);
    } else if (tabName === 'services') {
      document.getElementById('tab-services').innerHTML = renderServices(d.services || []);
    } else if (tabName === 'rich-rules') {
      currentRichRules = d.rich_rules || [];
      document.getElementById('tab-rich-rules').innerHTML = renderRichRules(currentRichRules);
    } else if (tabName === 'sources') {
      document.getElementById('tab-sources').innerHTML = renderSources(d.sources || []);
    }
  } catch(e) { /* ignore */ }
}

/* ---- Init ---- */
async function init() {
  await Promise.all([loadStatus(), loadZones(), loadAllServices()]);
}
